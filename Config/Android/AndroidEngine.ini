[/Script/Engine.RendererSettings]
; Disabling distance fields avoids requiring a full depth pre-pass, which is slow on standalone XR devices.
r.DistanceFields=0

; This reverts the mobile deferred renderer to single-pass/subpass rendering, which was the default before UE 5.7.
; Multi-pass deferred is currently disabled for VR Template due to rendering issues with mobile multi-view.
r.Mobile.AllowFramebufferFetch=1

; PSO precaching is extremely slow on first launch for standlone XR devices.
; Projects are recommended to use Bundled PSO Caches to avoid stuttering.
; Alternatively, re-enable PSO precaching and conceal it with a loading screen by querying FShaderPipelineCache::NumPrecompilesRemaining().
r.PSOPrecaching=0

[SystemSettings]
; --- Hazard: foveation boot profile (Android XR) ---
; These foveation CVars are ECVF_ReadOnly (boot-time only) and cannot be set at runtime.
; The PerfGovernor enables dynamic foveation here; per-frame headroom is handled by the runtime.
; NOTE: FB foveation path. On Android XR confirm the runtime advertises XR_FB_foveation;
; otherwise the Google foveation path (vendor plugin) is required. No-op if unsupported.
xr.OpenXRFBFoveationLevel=2
xr.OpenXRFBFoveationDynamic=True

; --- Hazard: frame synthesis (reprojection) ---
; The master switch defaults OFF, so enable it explicitly and render motion vectors for the
; reprojection pass. Frame synthesis (XR_EXT_frame_synthesis / FB space-warp) can ~halve the
; required render rate. Boot-time (ECVF_ReadOnly) so it must be baked into the package.
xr.OpenXRFrameSynthesis=True
r.Velocity.DirectlyRenderOpenXRMotionVectors=True
; Leave xr.PreferFBSpaceWarp unset so UE 5.8 prefers the Khronos EXT path; set True only for the FB path.

; --- Hazard: forward-MSAA sample count for the glasses (2x balances quality vs tile bandwidth) ---
r.Mobile.XRMSAAMode=2