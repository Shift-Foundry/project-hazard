; Hazard — device profiles.
; Android XR baseline: extend the engine's "Android" profile with standalone-headset-safe CVars.
; The PerfGovernor drives vr.PixelDensity per tier at runtime; this sets the boot baseline plus
; the memory/streaming budget a fanless mobile XR device needs to avoid OOM/texture thrash.

[Android DeviceProfile]
+CVars=vr.PixelDensity=1.0
+CVars=r.Streaming.PoolSize=700
+CVars=r.Streaming.LimitPoolSizeToVRAM=1
+CVars=r.Streaming.MaxTempMemoryAllowed=128
+CVars=s.ForceGCAfterLevelStreamedOut=1
+CVars=s.ContinuouslyIncrementalGCWhileLevelsPendingPurge=1
